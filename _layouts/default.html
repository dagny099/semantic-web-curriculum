<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
{% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/meaning-layer.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/docs.css' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/swirl/swirl-32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="512x512" href="{{ '/assets/swirl/swirl-512.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/swirl/swirl-180.png' | relative_url }}">
</head>
<body>

<div class="page">

  <header class="site-header">
    <a href="{{ '/' | relative_url }}" class="brand-mark">
      <img class="brand-swirl" src="{{ '/assets/swirl/swirl-mark-square.png' | relative_url }}" alt="" aria-hidden="true">
      <span class="brand-text">
        <span class="brand-eyebrow">a Sensemaking AI series</span>
        <span class="brand-name">Sensemaking Semantic Web</span>
      </span>
    </a>
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/map.html' | relative_url }}">Map</a>
      <a href="{{ '/SYLLABUS.html' | relative_url }}">Syllabus</a>
      <a href="{{ '/PROGRESS.html' | relative_url }}">Progress</a>
      <a href="{{ '/glossary.html' | relative_url }}">Glossary</a>
      <a href="{{ '/roadmap.html' | relative_url }}">Roadmap</a>
    </nav>
  </header>

  <main class="doc">
    {{ content }}
  </main>

  <footer>
    <div>
      <span class="footer-brand">Sensemaking AI</span>
      &nbsp;·&nbsp; Austin, TX &nbsp;·&nbsp; Code MIT &nbsp;·&nbsp; Content CC BY 4.0
    </div>
    <div class="links">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="https://github.com/dagny099/semantic-web-curriculum">GitHub</a>
      <a href="https://www.linkedin.com/in/barbara-hidalgo-sotelo/">LinkedIn</a>
      <a href="https://sensemaking-ai.com">sensemaking-ai.com</a>
      <a href="https://barbhs.com">barbhs.com</a>
    </div>
  </footer>

</div>

</body>
</html>
