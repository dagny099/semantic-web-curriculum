<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans', system-ui, sans-serif" role="img" aria-label="A map of how the Sensemaking Semantic Web curriculum fits together: a four-stop reading path with the cheat sheet as a reference rail alongside it.">
  <defs>
    <style>
