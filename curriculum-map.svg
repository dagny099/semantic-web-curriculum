      .mono  { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; fill: #0B4F4A; }
      .num   { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; fill: #FFFFFF; font-weight: 600; }
      .pill  { font-size: 7.5px; fill: #8A929A; font-weight: 600; letter-spacing: 1.2px; }
      .loop  { font-size: 10px; fill: #8A929A; }
    </style>
