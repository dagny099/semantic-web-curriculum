      .h1    { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-weight: 500; font-size: 30px; fill: #1F2A2E; }
      .brand { font-size: 10.5px; fill: #D85A30; font-weight: 600; letter-spacing: 2.5px; }
      .sub   { font-size: 13px; fill: #5A6671; }
